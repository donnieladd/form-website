<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM. — Operational Intelligence</title>
<meta name="description" content="form. is an operational intelligence ecosystem. the future needs form. vision needs structure.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2339FF14'/%3E%3C/svg%3E">

<script src="/performance-tier.js"></script>
<script src="/performance-config.js"></script>
<script src="/perf-observer.js"></script>

<link href="https://api.fontshare.com/v2/css?f[]=satoshi@200,300,400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/field.css?v=1">
<link rel="stylesheet" href="/nav-footer.css?v=11">
<link rel="stylesheet" href="/rev.css?v=3">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{cursor:none;}
body{
  background:#050608;min-height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;color:#f2f2f0;
  font-family:'Satoshi','Inter',system-ui,sans-serif;
}

/* ── grain — atmospheric film overlay above field, below content ── */
#grain{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:5;opacity:.07;
  mix-blend-mode:overlay;
}

/* ══════════════════════════════════════════════════════════
   HERO — invitation / emergence
   ══════════════════════════════════════════════════════════ */
.hero{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:64px 2rem 2rem;
}
.hero-inner{
  text-align:center;max-width:1200px;
  display:flex;flex-direction:column;align-items:center;
  gap:3.2rem;
}

/* the wordmark — restrained satoshi, signal-green square dot */
.hero-mark{
  position:relative;display:inline-block;
  line-height:.85;
}
.hero-word{
  display:inline-block;
  font-family:'Satoshi','Inter',sans-serif;
  font-weight:300;
  font-size:clamp(108px, 17vw, 260px);
  letter-spacing:-.04em;
  color:#f2f2f0;
  text-transform:lowercase;
  opacity:0;transform:translateY(22px);
  animation:hero-rise 1.6s cubic-bezier(.16,1,.3,1) .5s forwards;
  text-shadow:0 0 60px rgba(5,6,8,.35);
}
.hero-dot{
  position:absolute;
  bottom:.05em;right:-.18em;
  width:.18em;height:.18em;
  background:#39ff14;
  box-shadow:
    0 0 18px rgba(57,255,20,.45),
    0 0 36px rgba(57,255,20,.18);
  opacity:0;transform:scale(.5);
  animation:hero-dot 1.2s cubic-bezier(.16,1,.3,1) 1.3s forwards;
}
@keyframes hero-rise{
  to{opacity:1;transform:translateY(0);}
}
@keyframes hero-dot{
  to{opacity:1;transform:scale(1);}
}

/* tagline — ibm plex mono uppercase tracked */
.hero-tag{
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:.78rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(242,242,240,.72);
  line-height:2.2;
  opacity:0;transform:translateY(8px);
  animation:hero-fade 1.4s cubic-bezier(.16,1,.3,1) 1.7s forwards;
}
.hero-tag .accent{color:#39ff14;}
.hero-tag-rule{
  display:block;margin:1.2rem auto 0;
  width:34px;height:1px;background:rgba(242,242,240,.35);
  border:none;
}

/* CTA — thin signal-green outline rectangle, ENTER FORM → */
.hero-cta{
  display:inline-flex;align-items:center;gap:1em;
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:.74rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#39ff14;
  text-decoration:none;cursor:none;
  border:1px solid rgba(57,255,20,.55);
  padding:1.15rem 2.6rem;
  background:rgba(57,255,20,.025);
  transition:
    background .55s cubic-bezier(.16,1,.3,1),
    border-color .55s cubic-bezier(.16,1,.3,1),
    box-shadow .55s cubic-bezier(.16,1,.3,1),
    letter-spacing .55s cubic-bezier(.16,1,.3,1);
  opacity:0;transform:translateY(8px);
  animation:hero-fade 1.4s cubic-bezier(.16,1,.3,1) 2.1s forwards;
}
.hero-cta:hover{
  background:rgba(57,255,20,.08);
  border-color:#39ff14;
  box-shadow:0 0 32px rgba(57,255,20,.18);
  letter-spacing:.36em;
}
.hero-cta svg{width:14px;height:14px;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.hero-cta:hover svg{transform:translateX(4px);}

@keyframes hero-fade{
  to{opacity:1;transform:translateY(0);}
}

/* corner mono meta */
.hero-meta{
  position:fixed;z-index:11;
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:.62rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:rgba(242,242,240,.36);
  opacity:0;
  animation:hero-fade 1.4s cubic-bezier(.16,1,.3,1) 2.5s forwards;
  pointer-events:none;
}
.hero-meta-bl{bottom:24px;left:30px;}
.hero-meta-br{bottom:24px;right:30px;}
.hero-meta .acc{color:rgba(57,255,20,.7);}

/* ── responsive ── */
@media (max-width:900px){
  .hero{padding-top:80px;}
  .hero-inner{gap:2.4rem;}
  .hero-tag{font-size:.66rem;letter-spacing:.26em;line-height:2;}
  .hero-cta{font-size:.66rem;letter-spacing:.26em;padding:1rem 2rem;}
}
@media (max-width:600px){
  .hero-meta{font-size:.55rem;letter-spacing:.22em;}
  .hero-meta-bl,.hero-meta-br{bottom:14px;}
  .hero-meta-bl{left:16px;}
  .hero-meta-br{right:16px;}
  .hero-tag{font-size:.6rem;letter-spacing:.2em;line-height:1.9;}
  .hero-cta{font-size:.62rem;letter-spacing:.22em;padding:.95rem 1.7rem;}
}

@media (prefers-reduced-motion:reduce){
  .hero-word,.hero-dot,.hero-tag,.hero-cta,.hero-meta{
    opacity:1;transform:none;animation:none;
  }
}

/* nav transparency on the homepage — let the field show through */
#topnav{
  background:rgba(5,6,8,.42)!important;
  backdrop-filter:blur(16px) saturate(1.1);
  -webkit-backdrop-filter:blur(16px) saturate(1.1);
  border-bottom:1px solid rgba(255,255,255,.05);
}
</style>
</head>
<body data-field-density="open">

<!-- ── environmental field — one continuous world ── -->
<div class="env-field" aria-hidden="true">
  <div class="env-field-bg"></div>
  <canvas class="env-field-canvas"></canvas>
  <div class="env-field-veil"></div>
</div>

<!-- ── film grain ── -->
<img src="/grain.svg" id="grain" alt="" aria-hidden="true">

<!-- ── hero ── -->
<main class="hero">
  <div class="hero-inner">
    <div class="hero-mark">
      <span class="hero-word">form</span>
      <span class="hero-dot" aria-hidden="true"></span>
    </div>

    <div class="hero-tag">
      the future needs <span class="accent">form.</span><br>
      vision needs structure.
    </div>

    <a href="/vision.html" class="hero-cta" aria-label="enter form">
      <span>enter form</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="13,6 19,12 13,18"/>
      </svg>
    </a>
  </div>
</main>

<!-- ── corner meta ── -->
<div class="hero-meta hero-meta-bl">
  <span class="acc">[ 00 ]</span>&nbsp;&nbsp;form. // operational intelligence
</div>
<div class="hero-meta hero-meta-br">
  v.0.1&nbsp;&nbsp;—&nbsp;&nbsp;may 2026
</div>

<script src="/field.js?v=1" defer></script>
<script src="/rev.js?v=3" defer></script>
<script src="/nav-footer.js?v=17" defer></script>

</body>
</html>

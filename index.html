<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#050608;min-height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;color:#f2f2f0;
  font-family:'Satoshi','Inter',system-ui,sans-serif;
  cursor:default;
}
a,button{cursor:pointer;}

/* ── grain — atmospheric film overlay above field, below content ── */
#grain{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:5;opacity:.07;
  mix-blend-mode:overlay;
}

/* ══════════════════════════════════════════════════════════
   HERO — invitation / emergence
   ══════════════════════════════════════════════════════════ */
.hero{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:64px 2rem 2rem;
}
.hero-inner{
  text-align:center;max-width:1200px;
  display:flex;flex-direction:column;align-items:center;
  gap:3.2rem;
}

/* the wordmark — restrained satoshi + signal-green square dot
   geometry mirrors logo-core-final-2.svg exactly:
   square is ~15% of cap-height, sits ON the baseline,
   gap from the m is ~6.5% of cap-height */
.hero-mark{
  display:inline-flex;
  align-items:baseline;            /* pin dot bottom to m baseline */
  gap:clamp(6px, 1vw, 17px);       /* ≈0.065 × font-size */
  line-height:1;
}
.hero-word{
  display:inline-block;
  font-family:'Satoshi','Inter',sans-serif;
  font-weight:300;
  font-size:clamp(132px, 21vw, 320px);
  letter-spacing:-.04em;
  line-height:.85;
  color:#f2f2f0;
  text-transform:lowercase;
  opacity:0;transform:translateY(22px);
  animation:hero-rise 2.6s cubic-bezier(.16,1,.3,1) 1.1s forwards;
  text-shadow:
    0 2px 28px rgba(5,6,8,.78),
    0 0 80px rgba(5,6,8,.55);
}
.hero-dot{
  display:inline-block;flex:0 0 auto;
  /* match wordmark em base so 0.15em scales with the type */
  font-size:clamp(132px, 21vw, 320px);
  width:.15em;
  height:.15em;
  background:#39ff14;
  box-shadow:
    0 0 18px rgba(57,255,20,.55),
    0 0 38px rgba(57,255,20,.22);
  opacity:0;transform:scale(.78);
  transform-origin:center bottom;
  animation:hero-dot 2.2s cubic-bezier(.22,1,.36,1) 2.5s forwards;
}
@keyframes hero-rise{
  to{opacity:1;transform:translateY(0);}
}
@keyframes hero-dot{
  to{opacity:1;transform:scale(1);}
}

/* tagline — ibm plex mono uppercase tracked */
.hero-tag{
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-weight:500;
  font-size:1.15rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(242,242,240,.92);
  text-shadow:0 1px 18px rgba(5,6,8,.85), 0 0 36px rgba(5,6,8,.55);
  line-height:2.2;
  opacity:0;transform:translateY(8px);
  animation:hero-fade 2.2s cubic-bezier(.16,1,.3,1) 3.4s forwards;
}
.hero-tag .accent{color:#39ff14;}
.hero-tag-rule{
  display:block;margin:1.2rem auto 0;
  width:34px;height:1px;background:rgba(242,242,240,.35);
  border:none;
}

/* CTA — thin signal-green outline rectangle, ENTER FORM → */
.hero-cta{
  display:inline-flex;align-items:center;gap:1em;
  font-family:'IBM Plex Mono','SF Mono',monospace;
  font-size:.74rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:#39ff14;
  text-decoration:none;cursor:pointer;
  border:1px solid rgba(57,255,20,.55);
  padding:1.15rem 2.6rem;
  background:rgba(57,255,20,.025);
  transition:
    background .55s cubic-bezier(.16,1,.3,1),
    border-color .55s cubic-bezier(.16,1,.3,1),
    box-shadow .55s cubic-bezier(.16,1,.3,1),
    letter-spacing .55s cubic-bezier(.16,1,.3,1);
  opacity:0;transform:translateY(8px);
  animation:hero-fade 2.2s cubic-bezier(.16,1,.3,1) 4.4s forwards;
}
.hero-cta:hover{
  background:rgba(57,255,20,.08);
  border-color:#39ff14;
  box-shadow:0 0 32px rgba(57,255,20,.18);
  letter-spacing:.36em;
}
.hero-cta svg{width:14px;height:14px;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.hero-cta:hover svg{transform:translateX(4px);}

@keyframes hero-fade{
  to{opacity:1;transform:translateY(0);}
}

/* ── responsive ── */
@media (max-width:900px){
  .hero{padding-top:80px;}
  .hero-inner{gap:2.4rem;}
  .hero-tag{font-size:.66rem;letter-spacing:.26em;line-height:2;}
  .hero-cta{font-size:.66rem;letter-spacing:.26em;padding:1rem 2rem;}
}
@media (max-width:600px){
  .hero-tag{font-size:.6rem;letter-spacing:.2em;line-height:1.9;}
  .hero-cta{font-size:.62rem;letter-spacing:.22em;padding:.95rem 1.7rem;min-height:44px;display:inline-flex;align-items:center;}
}

@media (prefers-reduced-motion:reduce){
  .hero-word,.hero-dot,.hero-tag,.hero-cta{
    opacity:1;transform:none;animation:none;
  }
}

/* nav glass treatment lives in nav-footer.css (single source of truth, locked doctrine) */

/* ══════════════════════════════════════════════════════════
   HERO VIDEO BACKGROUND
   Sits inside .env-field, layered over .env-field-bg (the home-bg.avif
   poster) and beneath .env-field-canvas (particle drift) — same z-layer
   the image occupies. grain (z:5) and hero (z:10) remain above everything.
   The poster is the graceful fallback for reduced/minimal tiers and for
   prefers-reduced-motion.
   ══════════════════════════════════════════════════════════ */
#hero-video,
#hero-video-b,
#hero-video-veil{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
  display:none;       /* shown only when the perf-tier gate enables it */
}
#hero-video,
#hero-video-b{
  object-fit:cover;
  background:transparent;       /* let .env-field-bg poster show through —
                                   no dark midpoint during the swap */
  opacity:1;                    /* both layers fully opaque by default */
  transition:opacity 1.6s cubic-bezier(.45,0,.55,1);
  z-index:1;
}
#hero-video.is-top,
#hero-video-b.is-top{z-index:2;}
#hero-video.is-fading,
#hero-video-b.is-fading{opacity:0;}
#hero-video-veil{
  /* focused legibility pool — a soft centered atmosphere behind the type
     keeps `form.`, tagline and CTA readable while the video stays bright
     at the edges. very light corner vignette layered underneath. */
  background:
    radial-gradient(ellipse 46% 38% at 50% 50%, rgba(5,6,8,.55) 0%, rgba(5,6,8,.32) 55%, rgba(5,6,8,0) 85%),
    radial-gradient(ellipse at 50% 50%, rgba(5,6,8,0) 55%, rgba(5,6,8,.22) 100%);
}
@media (prefers-reduced-motion: reduce){
  #hero-video,#hero-video-b,#hero-video-veil{display:none !important;}
}
</style>
</head>
<body data-field-density="open">

<!-- ── environmental field — one continuous world ── -->
<div class="env-field" aria-hidden="true">
  <div class="env-field-bg"></div>

  <!-- ── hero video background ──
       Sits over the home-bg.avif poster (.env-field-bg) and beneath
       the particle canvas. The inline gating <script> near the bottom
       of <body> skips the video on reduced/minimal tiers and when
       prefers-reduced-motion is set, leaving the poster in place. -->
  <video id="hero-video"
         muted playsinline preload="auto" autoplay
         disableremoteplayback x-webkit-airplay="deny"
         poster="/home-bg.avif"
         aria-hidden="true">
    <source src="/home-bg.webm" type="video/webm">
    <source src="/home-bg.mp4" type="video/mp4">
  </video>
  <video id="hero-video-b"
         muted playsinline preload="auto"
         disableremoteplayback x-webkit-airplay="deny"
         poster="/home-bg.avif"
         aria-hidden="true">
    <source src="/home-bg.webm" type="video/webm">
    <source src="/home-bg.mp4" type="video/mp4">
  </video>
  <div id="hero-video-veil" aria-hidden="true"></div>

  <canvas class="env-field-canvas"></canvas>
  <div class="env-field-veil"></div>
</div>

<!-- hero-video performance-tier gate.
     Skips the video on reduced/minimal tiers and when prefers-reduced-motion
     is set, leaving the static home-bg.avif poster in place. -->
<script>
(function(){
  var a = document.getElementById('hero-video');
  var b = document.getElementById('hero-video-b');
  var veil = document.getElementById('hero-video-veil');
  if(!a || !b || !veil) return;

  function teardown(el){
    try { el.pause(); } catch(e){}
    el.removeAttribute('autoplay');
    el.removeAttribute('src');
    while(el.firstChild) el.removeChild(el.firstChild);
    try { el.load(); } catch(e){}
    el.style.display = 'none';
  }

  var rm = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var tier = window.FORM_TIER || document.documentElement.dataset.perf || 'full';
  if(rm || tier !== 'full'){
    teardown(a); teardown(b);
    veil.style.display = 'none';
    return;
  }

  a.style.display = 'block';
  b.style.display = 'block';
  veil.style.display = 'block';

  /* Crossfade window: start the swap this many seconds before the
     active clip's natural end. The incoming clip plays underneath at
     full opacity; the outgoing clip on top fades to 0. Because there's
     never a moment where both layers are partially opaque over black,
     there's no luminance dip — just one stream dissolving into another
     identical stream. */
  var FADE = 1.6;
  var swapping = false;

  function arm(active, idle){
    function onTime(){
      if(swapping) return;
      var dur = active.duration;
      if(!dur || isNaN(dur) || !isFinite(dur)) return;
      if(active.currentTime < dur - FADE) return;
      swapping = true;
      try { idle.currentTime = 0; } catch(e){}
      var pp = idle.play();
      var doSwap = function(){
        /* idle is already on top of nothing (z:1) and fully opaque, but
           it's currently underneath the active clip (z:2). Fade the
           active (top) clip out — the idle underneath is revealed with
           zero brightness change. */
        active.classList.add('is-fading');
        setTimeout(function(){
          /* Promote the (now visible) idle to top and reset the old top
             so it's ready for its next turn underneath. */
          idle.classList.add('is-top');
          active.classList.remove('is-top');
          active.classList.remove('is-fading');
          try { active.pause(); active.currentTime = 0; } catch(e){}
          active.removeEventListener('timeupdate', onTime);
          active.removeEventListener('ended', onEnded);
          swapping = false;
          arm(idle, active);
        }, FADE * 1000 + 80);
      };
      if(pp && typeof pp.then === 'function'){
        pp.then(doSwap).catch(doSwap);
      } else {
        doSwap();
      }
    }
    function onEnded(){
      /* Hard fallback if timeupdate didn't fire in time — keep playing
         instead of leaving a black frame. */
      try { active.currentTime = 0; active.play(); } catch(e){}
    }
    active.addEventListener('timeupdate', onTime);
    active.addEventListener('ended', onEnded);
  }

  /* Prime B silently so its first frame is decoded and ready the
     moment we promote it. */
  try { b.load(); } catch(e){}

  /* A starts on top, B sits underneath at full opacity but hidden by A. */
  a.classList.add('is-top');
  var pa = a.play();
  function bail(){
    teardown(a); teardown(b);
    veil.style.display = 'none';
  }
  if(pa && typeof pa.catch === 'function'){
    pa.then(function(){ arm(a, b); }).catch(bail);
  } else {
    arm(a, b);
  }

  /* If a benchmark later downgrades the tier, hide both videos and let
     the static poster (.env-field-bg → home-bg.avif) take over cleanly. */
  if(window.FORM_TIER_ONCHANGE){
    window.FORM_TIER_ONCHANGE.push(function(next){
      if(next !== 'full'){
        try { a.pause(); } catch(e){}
        try { b.pause(); } catch(e){}
        a.style.display = 'none';
        b.style.display = 'none';
        veil.style.display = 'none';
      }
    });
  }
})();
</script>

<!-- ── film grain ── -->
<img src="/grain.svg" id="grain" alt="" aria-hidden="true">

<!-- ── hero ── -->
<main class="hero">
  <div class="hero-inner">
    <div class="hero-mark">
      <span class="hero-word">form</span>
      <span class="hero-dot" aria-hidden="true"></span>
    </div>

    <div class="hero-tag">
      the future needs <span class="accent">form.</span><br>
      vision needs structure.
    </div>

    <a href="/vision.html" class="hero-cta" aria-label="enter form">
      <span>enter form</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="13,6 19,12 13,18"/>
      </svg>
    </a>
  </div>
</main>

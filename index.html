<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM. — Operational Intelligence</title>
<meta name="description" content="FORM. designs connected systems that adapt, amplify human potential, and create lasting impact.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2339FF14'/%3E%3C/svg%3E">
<script src="/performance-tier.js"></script>
<script src="/performance-config.js"></script>
<script src="/perf-observer.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{cursor:none;}
body{background:#000;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* ══════════════════════════════════════════════════════════
   TIER-0: BACKGROUND INTELLIGENCE  (z-index band: 0–2)
   Layers: #bg (AVIF field), #bg-ov (vignette), #ecocanvas (neural network)
   will-change: transform | contain: strict on canvas | isolation: isolate
   Degrades: particle count → signal rate → breathing animation → canvas halt
   prefers-reduced-motion: bg-breathe:none, parallax halts, canvas halts
   ══════════════════════════════════════════════════════════ */

/* ── BACKGROUND — let the multi-color field show ── */
#bg{position:fixed;inset:-5%;width:110%;height:110%;z-index:var(--z-tier-bg-intelligence);transform-origin:center;will-change:transform;animation:bg-breathe 38s ease-in-out infinite;}
#bg img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:filter 1.4s ease-out;}
@keyframes bg-breathe{
  0%  {transform:scale(1.00)  translate(0,0)      rotate(0deg);}
  18% {transform:scale(1.006) translate(-8px,5px)  rotate(-.04deg);}
  40% {transform:scale(1.011) translate(-11px,-7px) rotate(.03deg);}
  62% {transform:scale(1.008) translate(6px,-4px)  rotate(-.02deg);}
  80% {transform:scale(1.005) translate(7px,8px)   rotate(.04deg);}
  100%{transform:scale(1.00)  translate(0,0)      rotate(0deg);}
}

/* TIER-0: Vignette overlay — atmospheric depth layer within bg intelligence band */
#bg-ov{position:fixed;inset:0;z-index:var(--z-tier-bg-intelligence-ov);pointer-events:none;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,
    rgba(0,0,0,.08) 0%,
    rgba(0,0,0,.32) 45%,
    rgba(0,0,0,.72) 80%,
    rgba(0,0,0,.88) 100%
  );
}

/* TIER-0: Canvas — ecosystem neural network, additive blend | will-change:auto (JS-driven) | isolation:isolate */
#ecocanvas{position:fixed;inset:0;z-index:var(--z-tier-bg-intelligence-canvas);pointer-events:none;mix-blend-mode:screen;opacity:.88;}

/* ══════════════════════════════════════════════════════════
   TIER-1: ATMOSPHERE  (z-index band: 3–9)
   Layers: #grain (film grain), .scan (horizontal scan line)
   will-change: auto | contain: layout style | mix-blend-mode: overlay
   Degrades: scan line halts → grain opacity reduces to --opacity-grain-reduced
   prefers-reduced-motion: scan display:none, grain static
   ══════════════════════════════════════════════════════════ */

/* TIER-1: Grain — cinematic film texture, atmospheric humanity layer */
#grain{position:fixed;inset:0;z-index:var(--z-tier-atmosphere);opacity:.022;mix-blend-mode:overlay;pointer-events:none;width:100%;height:100%;display:block;}

/* ══════════════════════════════════════════════════════════
   TIER-5: CRITICAL UI  (z-index band: 900+)
   Layers: #veil (entry gate), #cdot (cursor dot), #cring (cursor ring)
   will-change: opacity | pointer-events: none | immutable — no yield
   prefers-reduced-motion: veil opacity:0 forced (bypassed, not removed)
   ══════════════════════════════════════════════════════════ */

/* TIER-5: Veil — page entry gate, Critical UI, immutable */
#veil{position:fixed;inset:0;background:#000;z-index:var(--z-tier-critical-veil-index);pointer-events:none;animation:veil-open 4.0s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes veil-open{0%,45%{opacity:1}100%{opacity:0}}

/* ══════════════════════════════════════════════════════════
   TIER-1: ATMOSPHERE (continued)
   .scan — horizontal luminance sweep, secondary atmospheric enrichment
   Throttles FIRST under load. Halts under prefers-reduced-motion.
   ══════════════════════════════════════════════════════════ */

/* TIER-1: Scan line — atmospheric luminance sweep | Tier-4 boundary: first to throttle */
.scan{position:fixed;left:0;right:0;height:1px;z-index:var(--z-tier-atmosphere-scan);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(57,255,20,.04),transparent);
  animation:scan-run 22s linear infinite 10s;}
@keyframes scan-run{from{top:-1px}to{top:100vh}}

/* ══════════════════════════════════════════════════════════
   TIER-5: CRITICAL UI — Cursor system
   Cursor dot and ring are Critical UI infrastructure.
   Immutable — no yield, no degradation permitted.
   prefers-reduced-motion: ring lag loop not started
   ══════════════════════════════════════════════════════════ */

/* TIER-5: Cursor dot — Critical UI, immutable | will-change: left, top */
#cdot{position:fixed;z-index:var(--z-tier-cursor-dot);width:4px;height:4px;background:#39FF14;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 5px rgba(57,255,20,.7),0 0 14px rgba(57,255,20,.22);opacity:.85;}
/* TIER-5: Cursor ring — Critical UI, immutable | Tier-4 lag animation halts under reduced-motion */
#cring{position:fixed;z-index:var(--z-tier-cursor-ring);width:22px;height:22px;border:1px solid rgba(57,255,20,.28);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;transition:width .7s cubic-bezier(.16,1,.3,1),height .7s cubic-bezier(.16,1,.3,1),border-color .5s,box-shadow .5s;}
body.hl  #cring{width:32px;height:32px;border-color:rgba(57,255,20,.55);}
body.hcta #cring{width:44px;height:44px;border-color:rgba(57,255,20,.7);box-shadow:0 0 14px rgba(57,255,20,.16);}

/* ── KEYFRAMES ── */
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════════════════════════
   TIER-2: HERO ENVIRONMENT  (z-index band: 10–19)
   Layers: #ui (container), #hero-stack, .wm, .sub, .enter-btn, #scroll
   will-change: opacity | no yield — preserved at all times
   First-frame landmark content. Must be fully rendered before veil lifts.
   prefers-reduced-motion: opacity:1 forced, transform:none forced
   ══════════════════════════════════════════════════════════ */

/* TIER-2: UI container — Hero Environment root layer, contains all UI sub-layers */
#ui{position:fixed;inset:0;z-index:var(--z-tier-hero);pointer-events:none;}
#ui a,#ui .dom{pointer-events:auto;}

/* ── BRACKET corners ── */
.bbox{position:relative;padding:10px 14px;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.bbox::before,.bbox::after,.bc::before,.bc::after{content:'';position:absolute;width:13px;height:13px;border-color:rgba(57,255,20,.65);border-style:solid;}
.bbox::before{top:0;left:0;border-width:1px 0 0 1px;}
.bbox::after {top:0;right:0;border-width:1px 1px 0 0;}
.bc::before  {bottom:0;left:0;border-width:0 0 1px 1px;}
.bc::after   {bottom:0;right:0;border-width:0 1px 1px 0;}
.g{color:#39FF14;}

/* ══════════════════════════════════════════════════════════
   TIER-3: NAVIGATION  (z-index band: 20–49)
   Layers: #nav, #nav-links, .cm (corner metadata), #tl-left, #domains
   will-change: opacity | backdrop-filter: blur | immutable — no yield
   Renders after veil lift animation completes.
   prefers-reduced-motion: opacity:1 forced
   ══════════════════════════════════════════════════════════ */

/* TIER-3: Nav — Navigation, immutable, renders after veil lift */#logo{height:36px;width:auto;cursor:none;display:block;}
#nav-links{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;align-items:center;gap:2.6rem;list-style:none;
}
#nav-links a{
  font-family:'IBM Plex Mono',monospace;
  font-size:.875rem;font-weight:400;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(242,242,240,.75);
  text-decoration:none;cursor:none;transition:color .3s;
  text-shadow:0 0 18px rgba(0,0,0,.9);
}
#nav-links a:hover{color:#fff;}
#strat{
  font-family:'IBM Plex Mono',monospace;
  font-size:.875rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(242,242,240,.82);text-decoration:none;cursor:none;
  border:1px solid rgba(242,242,240,.28);
  padding:.55rem 1.6rem;white-space:nowrap;
  background:rgba(0,0,0,.18);
  box-shadow:0 0 0 1px rgba(57,255,20,.05),inset 0 0 14px rgba(255,255,255,.02);
  transition:color .4s,border-color .4s,box-shadow .5s,background .4s,letter-spacing .4s;
}
#strat:hover{
  color:rgba(57,255,20,.95);
  border-color:rgba(57,255,20,.58);
  background:rgba(57,255,20,.04);
  box-shadow:0 0 26px rgba(57,255,20,.16),0 0 0 1px rgba(57,255,20,.18),inset 0 0 18px rgba(57,255,20,.04);
  letter-spacing:.21em;
}

/* TIER-3: Corner metadata elements — Navigation tier, immutable, renders after veil */
.cm{position:absolute;z-index:var(--z-tier-navigation);opacity:0;animation:fadein .7s cubic-bezier(.16,1,.3,1) 4.2s forwards;}
.cm .bbox{
  font-family:'IBM Plex Mono',monospace;
  font-size:.8rem;font-weight:400;letter-spacing:.12em;
  text-transform:uppercase;line-height:1.8;color:rgba(242,242,240,.88);
  text-shadow:0 1px 8px rgba(0,0,0,.8);
}
#cm-tl{top:7%;left:2%;}
#cm-tr{top:7%;right:2%;} #cm-tr .bbox{text-align:right;}

/* ── TIER-3: NAVIGATION — Left timeline pulse indicator, immutable */
#tl-left{position:absolute;left:1.6%;top:22%;bottom:43%;display:flex;flex-direction:column;align-items:center;opacity:0;animation:fadein .7s cubic-bezier(.16,1,.3,1) 4.4s forwards;}
.tseg{width:1px;flex:1;background:rgba(57,255,20,.12);}
.tdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:rgba(57,255,20,.28);}
.tdot.on{background:#39FF14;box-shadow:0 0 8px #39FF14,0 0 18px rgba(57,255,20,.4);}

/* ── TIER-3: NAVIGATION — Domain list, Navigation tier, immutable */
#domains{
  position:absolute;right:2%;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:flex-end;gap:.9rem;
  opacity:0;
}
.dom{
  display:flex;align-items:center;gap:.65rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:.82rem;font-weight:400;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(242,242,240,.65);
  cursor:none;white-space:nowrap;transition:color .3s;
  text-shadow:0 1px 10px rgba(0,0,0,.9);
}
.dom:hover{color:rgba(242,242,240,.98);}
.dom.dom-active{color:rgba(242,242,240,.98);}
.ddot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── TIER-2: HERO ENVIRONMENT — Center stack, first-frame landmark content, no yield */
#hero-stack{
  position:absolute;
  top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding-top:calc(36vh - 6.6vw);
  pointer-events:none;
  text-align:center;
}

/* PRIMARY CORE LOGO — main ecosystem identity */
.wm{
  display:block;
  width:clamp(300px,34vw,540px);
  height:auto;
  opacity:0;animation:fadeup 1.5s cubic-bezier(.16,1,.3,1) 3.0s forwards;
  filter:drop-shadow(0 0 55px rgba(255,255,255,.07));
}

/* Tag lines */
.sub{
  font-family:'Satoshi','Inter',sans-serif;
  font-size:1.18rem;font-weight:400;
  letter-spacing:.04em;line-height:2;
  text-transform:uppercase;
  color:rgba(242,242,240,.92);
  max-width:680px;
  margin-top:13vh;
  opacity:0;animation:fadeup 1.2s cubic-bezier(.16,1,.3,1) 3.4s forwards;
  text-shadow:0 2px 28px rgba(0,0,0,.98),0 1px 6px rgba(0,0,0,.85);
}
.sub .g{color:#39FF14;font-weight:500;}

/* Thin divider */
.hero-line{
  width:38px;height:1px;background:rgba(57,255,20,.42);
  margin-top:1.8rem;
  opacity:0;animation:fadein 1s cubic-bezier(.16,1,.3,1) 3.9s forwards;
}

/* ENTER FORM CTA */
.enter-btn{
  display:inline-flex;align-items:center;gap:1.4rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:.95rem;font-weight:500;letter-spacing:.32em;text-transform:uppercase;
  color:#39FF14;
  text-decoration:none;cursor:none;
  border:1px solid rgba(57,255,20,.68);
  background:rgba(0,0,0,.28);
  padding:1.3rem 4.5rem;white-space:nowrap;
  pointer-events:auto;
  margin-top:2.4rem;
  opacity:0;animation:fadeup 1s cubic-bezier(.16,1,.3,1) 4.1s forwards;
  transition:background .4s,border-color .4s,box-shadow .4s,letter-spacing .4s,color .4s;
  box-shadow:0 0 0 1px rgba(57,255,20,.1),inset 0 0 20px rgba(57,255,20,.03);
}
.enter-btn:hover{
  background:rgba(57,255,20,.1);
  border-color:#39FF14;
  box-shadow:0 0 40px rgba(57,255,20,.28),0 0 0 1px rgba(57,255,20,.3),inset 0 0 28px rgba(57,255,20,.05);
  letter-spacing:.38em;
  color:#7CFF00;
}
.enter-btn .arr{font-size:1.5rem;line-height:1;transition:transform .45s cubic-bezier(.16,1,.3,1);}
.enter-btn:hover .arr{transform:translateX(8px);}

/* ── TIER-2: HERO ENVIRONMENT — Scroll indicator, Hero Environment sub-element, no yield */
#scroll{position:absolute;bottom:5.5%;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.55rem;opacity:0;animation:fadein .8s cubic-bezier(.16,1,.3,1) 4.8s forwards;pointer-events:none;}
.smouse{width:20px;height:32px;border:1px solid rgba(242,242,240,.28);border-radius:10px;display:flex;justify-content:center;padding-top:6px;}
.swheel{width:2px;height:5px;background:rgba(242,242,240,.42);border-radius:2px;animation:sdrop 2.4s ease-in-out infinite;}
@keyframes sdrop{0%{opacity:1;transform:translateY(0)}60%{opacity:.12;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
.slbl{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:rgba(242,242,240,.5);white-space:nowrap;}

/* Status dot */@keyframes sdot-beat{0%,100%{opacity:1}55%{opacity:.2}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
  #veil{opacity:0!important;}
  .wm,.sub,.hero-line,.enter-btn,#mark-wrap,.cm,#tl-left,#domains,#nav,#scroll{opacity:1!important;transform:none!important;}
  #bg{animation:none!important;}.scan{display:none;}
}

/* ── PERFORMANCE TIER GATES ── */

/* Reduced — slow atmospheric motion, halve grain */
[data-perf="reduced"] #bg{animation:none!important;}
[data-perf="reduced"] .scan{animation-duration:44s;}
[data-perf="reduced"] .swheel{animation-duration:4.8s;}[data-perf="reduced"] #grain{opacity:.012;}

/* Minimal — strip all atmospheric animation */
[data-perf="minimal"] #bg{animation:none!important;}
[data-perf="minimal"] .scan{animation:none!important;display:none!important;}
[data-perf="minimal"] .swheel{animation:none!important;}[data-perf="minimal"] #grain{display:none!important;}
[data-perf="minimal"] #cdot,[data-perf="minimal"] #cring{display:none!important;}
[data-perf="minimal"] html,[data-perf="minimal"] body{cursor:auto!important;}
[data-perf="minimal"] #bg-ov{display:none!important;}
[data-perf="minimal"] #ecocanvas{display:none!important;}
[data-perf="reduced"] #bg-ov{opacity:.72;}

/* ── TIER LEVEL GATES — page-specific overrides only (shared rules in rendering-hierarchy.css) ── */
[data-tier-level="1"] #bg{animation:none!important;}
[data-tier-level="1"] .scan{animation-duration:44s;}
[data-tier-level="1"] .swheel{animation-duration:4.8s;}[data-tier-level="1"] #bg-ov{opacity:.72;}
[data-tier-level="2"] #bg{animation:none!important;}
[data-tier-level="2"] .swheel{animation:none!important;}[data-tier-level="2"] #bg-ov{display:none!important;}
[data-tier-level="2"] #ecocanvas{display:none!important;}
</style>

<body>

<!-- TIER-5: CRITICAL UI — Veil entry gate | immutable | prefers-reduced-motion: opacity:0 forced -->
<div id="veil"></div>
<!-- TIER-5: CRITICAL UI — Cursor dot | immutable -->
<div id="cdot"></div>
<!-- TIER-5: CRITICAL UI — Cursor ring lag | ring lag loop halts under prefers-reduced-motion -->
<div id="cring"></div>
<!-- TIER-1: ATMOSPHERE — Horizontal scan line | first to throttle | display:none under reduced-motion -->
<div class="scan"></div>

<!-- TIER-0: BACKGROUND INTELLIGENCE — AVIF atmospheric field | will-change:transform | bg-breathe halts under reduced-motion -->
<div id="bg"><img id="bg-img" src="/bg.avif" alt=""></div>
<!-- TIER-0: BACKGROUND INTELLIGENCE — Vignette overlay | static gradient, no yield -->
<div id="bg-ov"></div>

<!-- TIER-0: BACKGROUND INTELLIGENCE — Neural network canvas | screen blend | degrades: particle count → signal rate → halt -->
<canvas id="ecocanvas"></canvas>

<!-- TIER-1: ATMOSPHERE — Film grain | opacity:.022 | mix-blend-mode:overlay | static SVG -->
<img id="grain" src="/grain.svg" alt="">

<!-- TIER-2: HERO ENVIRONMENT — UI root container | first-frame landmark content | no yield -->
<div id="ui">

  <!-- TIER-3: NAVIGATION — Top nav bar | immutable | renders after veil lift -->

  <!-- TIER-3: NAVIGATION — Left timeline pulse indicator | immutable -->
  <div id="tl-left">
    <div class="tdot"></div><div class="tseg"></div>
    <div class="tdot on"></div><div class="tseg"></div>
    <div class="tdot"></div>
  </div>

  <!-- TIER-3: NAVIGATION — Domain list with hue cycle | Navigation tier, immutable -->
  <div id="domains">
    <div class="dom">Intelligence<span class="ddot" style="background:#2962FF;box-shadow:0 0 8px #2962FF;margin-left:.65rem;"></span></div>
    <div class="dom">Execution<span class="ddot" style="background:#39FF14;box-shadow:0 0 8px #39FF14;margin-left:.65rem;"></span></div>
    <div class="dom">Creativity<span class="ddot" style="background:#8CB800;box-shadow:0 0 8px #8CB800;margin-left:.65rem;"></span></div>
    <div class="dom">Experience<span class="ddot" style="background:#FF6B35;box-shadow:0 0 8px #FF6B35;margin-left:.65rem;"></span></div>
    <div class="dom">Ministry<span class="ddot" style="background:#8B5CF6;box-shadow:0 0 8px #8B5CF6;margin-left:.65rem;"></span></div>
    <div class="dom">Humanity<span class="ddot" style="background:#FF4E9B;box-shadow:0 0 8px #FF4E9B;margin-left:.65rem;"></span></div>
  </div>

  <!-- TIER-2: HERO ENVIRONMENT — Hero center stack | logo, taglines, CTA | no yield -->
  <div id="hero-stack">

    <!-- PRIMARY CORE LOGO — hero ecosystem identity -->
    <img class="wm" src="/logo-core-final-2.svg" alt="FORM.">

    <!-- FORM LOCKUP -->
    <p class="sub">
      The Future Needs <span class="g">FORM.</span><br>
      Vision Needs Structure.
    </p>

    <div class="hero-line"></div>
    <a class="enter-btn" href="/ecosystem.html">Enter Form<span class="arr">→</span></a>
  </div>

  <!-- TIER-2: HERO ENVIRONMENT — Scroll indicator | Hero Environment sub-element -->
  <div id="scroll">
    <div class="smouse"><div class="swheel"></div></div>
    <div class="slbl">Scroll to Explore</div>
  </div>

</div>

<script>
/* ── REDUCED MOTION GATE — shared across all IIFEs ── */
var reducedMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
/* ── PERFORMANCE TIER — set by performance-tier.js before first paint ── */
var tier=window.FORM_TIER||'full';

/* ── VIEWPORT SCALE ── */
(function(){
  const DW=1440,DH=900;
  function s(){document.documentElement.style.zoom=Math.min(innerWidth/DW,innerHeight/DH,1);}
  s();window.addEventListener('resize',s);
})();

(function(){
'use strict';

/* ── GRAIN ── */
const grainEl=document.getElementById('grain');
if(grainEl){
  if(tier==='minimal'){grainEl.parentNode&&grainEl.parentNode.removeChild(grainEl);}
  else if(tier==='reduced'){grainEl.style.opacity=String(window.PERF_CONFIG&&window.PERF_CONFIG.GRAIN_OPACITY_REDUCED||0.012);}
}

/* ── CURSOR ── */
/* Always define vars outside if/else so FORM_TIER_ONCHANGE callbacks can
   access them if tier upgrades from provisional-minimal to reduced. */
const dot=document.getElementById('cdot'),ring=document.getElementById('cring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(dot){dot.style.left=mx+'px';dot.style.top=my+'px';}});
function _startCursorRing(){
  if(reducedMotion)return;
  (function cl(){
    var _pt=document.documentElement.dataset.perf||'full';
    if(_pt==='minimal'||_pt==='reduced')return;
    rx=mx;ry=my;if(ring){ring.style.left=rx+'px';ring.style.top=ry+'px';}requestAnimationFrame(cl);
  })();
}
if(tier!=='minimal')_startCursorRing();
/* Hover effects always active — CSS [data-perf="minimal"] hides cursor elements */
document.querySelectorAll('a,.dom').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hl'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hl'));
});
['.enter-btn','#strat'].forEach(s=>{
  document.querySelectorAll(s).forEach(el=>{
    el.addEventListener('mouseenter',()=>{document.body.classList.remove('hl');document.body.classList.add('hcta');});
    el.addEventListener('mouseleave',()=>document.body.classList.remove('hcta'));
  });
});

/* ── BG PARALLAX ── */
const bg=document.getElementById('bg');
let tpx=0,tpy=0,cpx=0,cpy=0;

/* ── ECOSYSTEM CANVAS: Living Neural Network ── */
(function(){
'use strict';
const _canvasTier=window.FORM_TIER||'full';
const canvas=document.getElementById('ecocanvas');
const ctx=canvas.getContext('2d');
let W,H;

/* Domain zone colors (left → right) */
const ZONE_COLORS=[
  {r:57, g:255, b:20},    // Signal Green (Execution) — left
  {r:140,g:255, b:80},    // Yellow-green (Creativity)
  {r:80, g:200, b:255},   // Cyan (Intelligence)
  {r:255,g:255, b:255},   // White core (center burst)
  {r:255,g:107, b:53},    // Orange (Experience)
  {r:139,g:92,  b:246},   // Purple (Ministry)
  {r:255,g:78,  b:155},   // Pink (Humanity) — right
];

function zoneColor(xFrac){
  if(!isFinite(xFrac)||isNaN(xFrac))xFrac=0;
  xFrac=Math.max(0,Math.min(1,xFrac));
  const t=xFrac*(ZONE_COLORS.length-1);
  const i=Math.floor(t);
  const f=t-i;
  const a=ZONE_COLORS[Math.min(i,ZONE_COLORS.length-1)];
  const b=ZONE_COLORS[Math.min(i+1,ZONE_COLORS.length-1)];
  return{
    r:Math.round(a.r+(b.r-a.r)*f),
    g:Math.round(a.g+(b.g-a.g)*f),
    b:Math.round(a.b+(b.b-a.b)*f),
  };
}

/* Particles — counts scaled per performance tier */
const _N_FULL=PERF_CONFIG.MAX_NODES;
const N=_canvasTier==='minimal'?30:_canvasTier==='reduced'?(PERF_CONFIG.MAX_NODES_REDUCED||Math.ceil(_N_FULL/2)):_N_FULL;
const CONN_RADIUS=_canvasTier==='reduced'?Math.ceil(PERF_CONFIG.CONN_RADIUS*0.75):PERF_CONFIG.CONN_RADIUS;
const SPEED_RANGE=[PERF_CONFIG.SPEED_MIN,PERF_CONFIG.SPEED_MAX];

function mkParticle(){
  const x=Math.random()*W;
  const y=Math.random()*H;
  const speed=(SPEED_RANGE[0]+Math.random()*(SPEED_RANGE[1]-SPEED_RANGE[0]))*0.55;
  const angle=Math.random()*Math.PI*2;
  return{
    x,y,
    vx:Math.cos(angle)*speed,
    vy:Math.sin(angle)*speed,
    r:0.15+Math.random()*0.4,
    alpha:0.22+Math.random()*0.38,
    // Signal state for propagation
    signal:0,          // 0-1, decays over time
    signalColor:null,  // {r,g,b} when active
  };
}

let pts=[];
function initPts(){pts=[];for(let i=0;i<N;i++)pts.push(mkParticle());}

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  initPts();
}

/* Mouse influence */
let mouseX=W/2||720,mouseY=H/2||450;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});

/* Signal propagation system */
let lastSignal=0;
let _activeSignals=0; // concurrent propagation chain counter — capped at MAX_ACTIVE_SIGNALS
function tryFireSignal(){
  if(!W||!H)return;
  const now=Date.now();
  if(now-lastSignal < PERF_CONFIG.SIGNAL_MIN_INTERVAL_MS)return;
  if(_activeSignals>=PERF_CONFIG.MAX_ACTIVE_SIGNALS)return; // concurrency cap
  // Pick a random particle to activate
  const idx=Math.floor(Math.random()*pts.length);
  const p=pts[idx];
  const c=zoneColor(p.x/W);
  p.signal=1.0;
  p.signalColor=c;
  // Propagate to nearest neighbors sequentially
  _activeSignals++;
  propagate(idx,c,0);
  lastSignal=now;
}

function propagate(fromIdx,color,depth){
  if(depth>PERF_CONFIG.MAX_SIGNAL_DEPTH){_activeSignals=Math.max(0,_activeSignals-1);return;}
  const from=pts[fromIdx];
  // Find nearest unactivated neighbor within radius
  let best=-1,bestDist=Infinity;
  for(let i=0;i<pts.length;i++){
    if(i===fromIdx)continue;
    if(pts[i].signal>0.3)continue; // already signaling
    const dx=pts[i].x-from.x,dy=pts[i].y-from.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<CONN_RADIUS&&d<bestDist){bestDist=d;best=i;}
  }
  if(best<0){_activeSignals=Math.max(0,_activeSignals-1);return;}
  const delay=200+depth*80+Math.random()*120;
  setTimeout(()=>{
    pts[best].signal=0.85;
    pts[best].signalColor=color;
    propagate(best,color,depth+1);
  },delay);
}

/* Gate signal interval — minimal tier never starts canvas work */
var _tryFireInterval=null;
if(_canvasTier!=='minimal'){
  _tryFireInterval=setInterval(tryFireSignal, PERF_CONFIG.SIGNAL_CHECK_INTERVAL_MS);
  if(window.FORM_TIER_CANCEL)window.FORM_TIER_CANCEL.push(function(){clearInterval(_tryFireInterval);});
}

/* ── ECOSYSTEM INTERACTION INTELLIGENCE ── */

// Environmental pulse pool — expanding atmospheric rings from hover points (clamped to MAX_ENV_PULSES)
const ENV_PULSES=[];
function firePulse(x,y,col,intensity){
  if(ENV_PULSES.length>=PERF_CONFIG.MAX_ENV_PULSES)return;
  ENV_PULSES.push({x,y,r:0,maxR:38+Math.random()*32,
    alpha:(intensity||0.4)*0.30,color:col||{r:57,g:255,b:20},
    spd:0.038+Math.random()*0.028});
}

// Gentle particle attractor — particles drift toward hovered element
let attract=null;

// Sporadic ambient drift — occasional soft ecosystem breathing
let ambDrift={vx:0,vy:0,str:0};
let lastAmb=Date.now(), nextAmb=11000+Math.random()*9000;
function tryAmbientDrift(){
  if(!W||!H)return;
  const now=Date.now();
  if(now-lastAmb<nextAmb)return;
  const ang=Math.random()*Math.PI*2;
  const s=0.010+Math.random()*0.014;
  ambDrift={vx:Math.cos(ang)*s,vy:Math.sin(ang)*s,str:1.0};
  firePulse(W*(0.15+Math.random()*0.7),H*(0.2+Math.random()*0.6),zoneColor(Math.random()),0.18);
  lastAmb=now; nextAmb=11000+Math.random()*9000;
}

// Trigger signal propagation from nearest node to a canvas point
function triggerSignalAt(x,y){
  let best=-1,bd=Infinity;
  for(let i=0;i<pts.length;i++){
    const dx=pts[i].x-x,dy=pts[i].y-y,d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=i;}
  }
  if(best>=0){const c=zoneColor(pts[best].x/W);pts[best].signal=1.0;pts[best].signalColor=c;propagate(best,c,0);}
}

// Wire ecosystem hover to an element
function ecoHover(el,type,col){
  el.addEventListener('mouseenter',()=>{
    const rc=el.getBoundingClientRect();
    const cx=rc.left+rc.width*.5, cy=rc.top+rc.height*.5;
    const intensity=type==='cta'?0.68:type==='domain'?0.56:0.52;
    // Primary pulse at element position
    firePulse(cx,cy,col,intensity);
    // Tight secondary pulse — atmospheric diffusion
    firePulse(cx+(Math.random()-.5)*28,cy+(Math.random()-.5)*18,col,intensity*.42);
    // Nav gets a third whisper pulse further out
    if(type==='nav'){
      firePulse(cx+(Math.random()-.5)*55,cy+(Math.random()-.5)*40,col,intensity*.22);
    }
    attract={x:cx,y:cy,strength:type==='cta'?0.009:type==='nav'?0.007:0.004};
    // All types trigger signal propagation — nav included
    triggerSignalAt(cx,cy);
  });
  el.addEventListener('mouseleave',()=>{attract=null;});
}

// Wire all interactive elements
const DOMAIN_COLORS={
  'Intelligence':{r:41,g:98,b:255},'Execution':{r:57,g:255,b:20},
  'Creativity':{r:140,g:184,b:0},'Experience':{r:255,g:107,b:53},
  'Ministry':{r:139,g:92,b:246},'Humanity':{r:255,g:78,b:155}
};
document.querySelectorAll('#nav-links a').forEach(a=>ecoHover(a,'nav',{r:160,g:190,b:255}));
const stratEl=document.querySelector('#strat');
if(stratEl)ecoHover(stratEl,'cta',{r:57,g:255,b:20});
document.querySelectorAll('.enter-btn').forEach(a=>ecoHover(a,'cta',{r:57,g:255,b:20}));
document.querySelectorAll('.dom').forEach(dom=>{
  const name=dom.childNodes[0]&&dom.childNodes[0].textContent?dom.childNodes[0].textContent.trim():'';
  const col=DOMAIN_COLORS[name]||{r:57,g:255,b:20};
  ecoHover(dom,'domain',col);
});

/* SVG snapshot — replaces canvas with a static SVG scatter on minimal tier.
   Canvas is hidden; an inline SVG with zone-colored dot particles is injected.
   Called at init and from draw() self-termination path. Idempotent. */
var _svgInjected=false;
function _injectSVGSnapshot(){
  if(_svgInjected)return;
  _svgInjected=true;
  /* Hide canvas (CSS [data-perf="minimal"] also hides it, but belt-and-suspenders) */
  canvas.style.display='none';
  if(!W||!H)return;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('id','eco-svg-snap');
  svg.setAttribute('width','100%');
  svg.setAttribute('height','100%');
  /* Match canvas stacking/blend exactly */
  var cz=window.getComputedStyle(canvas).zIndex;
  svg.style.cssText='position:fixed;inset:0;mix-blend-mode:screen;opacity:.88;pointer-events:none;z-index:'+(cz||'2')+';';
  /* Scatter ~30 particles across the viewport in zone hues */
  for(var _si=0;_si<30;_si++){
    var _sx=Math.random()*W,_sy=Math.random()*H;
    var _sc=zoneColor(_sx/W);
    var _sr=(0.4+Math.random()*1.1).toFixed(2);
    var _sa=(0.22+Math.random()*0.35).toFixed(3);
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',_sx.toFixed(1));c.setAttribute('cy',_sy.toFixed(1));
    c.setAttribute('r',_sr);
    c.setAttribute('fill','rgba('+_sc.r+','+_sc.g+','+_sc.b+','+_sa+')');
    svg.appendChild(c);
  }
  document.body.appendChild(svg);
}

let _frameStart=performance.now();
function draw(){
  /* Dynamic tier check — self-terminate if benchmark downgraded tier to minimal */
  const _lt=document.documentElement.dataset.perf||'full';
  if(_lt==='minimal'){_injectSVGSnapshot();return;}
  if(!W||!H){requestAnimationFrame(draw);return;}

  /* Frame-time guard — dev builds only (gated on DEBUG_PERF) */
  if(PERF_CONFIG.DEBUG_PERF){
    const _now=performance.now();
    const _elapsed=_now-_frameStart;
    if(_elapsed>PERF_CONFIG.SOFT_FLOOR_FRAME_MS){
      console.warn('[PERF] Frame critically over budget: '+_elapsed.toFixed(2)+'ms (soft floor '+PERF_CONFIG.SOFT_FLOOR_FRAME_MS+'ms)');
    } else if(_elapsed>PERF_CONFIG.TARGET_FRAME_MS){
      console.warn('[PERF] Frame over target: '+_elapsed.toFixed(2)+'ms (target '+PERF_CONFIG.TARGET_FRAME_MS+'ms)');
    }
    _frameStart=_now;
  }

  // Ambient drift lifecycle
  tryAmbientDrift();
  if(ambDrift.str>0.001){ambDrift.str*=0.991;ambDrift.vx*=0.991;ambDrift.vy*=0.991;}
  else{ambDrift.str=0;}

  ctx.clearRect(0,0,W,H);

  /* Update particles */
  for(let i=0;i<pts.length;i++){
    const p=pts[i];

    /* Slow brownian drift — subtle direction changes */
    if(Math.random()<0.008){
      const turn=(Math.random()-.5)*0.8;
      const angle=Math.atan2(p.vy,p.vx)+turn;
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      p.vx=Math.cos(angle)*spd;
      p.vy=Math.sin(angle)*spd;
    }

    /* Decoupled from cursor — environmental drift only (no mouse repulsion) */

    /* Ecosystem attractor — quiet gravitational drift toward hover point */
    if(attract){
      const dxa=p.x-attract.x,dya=p.y-attract.y;
      const da2=dxa*dxa+dya*dya;
      if(da2<190000&&da2>0){
        const da=Math.sqrt(da2);
        const f=attract.strength*0.4*(1-da/440);
        p.vx-=dxa/da*f;p.vy-=dya/da*f;
      }
    }

    /* Ambient drift — sporadic organic ecosystem motion */
    if(ambDrift.str>0.001){
      p.vx+=ambDrift.vx*0.06;
      p.vy+=ambDrift.vy*0.06;
    }

    /* Speed cap — hard clamp from PERF_CONFIG */
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(spd>PERF_CONFIG.SPEED_CAP){p.vx*=PERF_CONFIG.SPEED_CAP/spd;p.vy*=PERF_CONFIG.SPEED_CAP/spd;}
    if(spd<0.10){p.vx*=1.15;p.vy*=1.15;}

    p.x+=p.vx;p.y+=p.vy;

    /* Wrap edges with fade */
    if(p.x<-20)p.x=W+20;
    if(p.x>W+20)p.x=-20;
    if(p.y<-20)p.y=H+20;
    if(p.y>H+20)p.y=-20;

    /* Signal decay */
    if(p.signal>0)p.signal*=0.976;
    if(p.signal<0.01)p.signal=0;
  }

  /* Draw connections — optimised: dist² early-exit, no per-line gradient */
  const CR2=CONN_RADIUS*CONN_RADIUS;
  for(let i=0;i<pts.length-1;i++){
    for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist2=dx*dx+dy*dy;
      if(dist2>CR2)continue;
      const dist=Math.sqrt(dist2);
      const fade=1-dist/CONN_RADIUS;
      const sigStrength=Math.max(a.signal,b.signal);

      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      if(sigStrength>0.15){
        const sc=a.signal>b.signal?(a.signalColor||zoneColor(a.x/W)):(b.signalColor||zoneColor(b.x/W));
        ctx.strokeStyle=`rgba(${sc.r},${sc.g},${sc.b},${((0.025+fade*0.10+sigStrength*0.26)*0.92).toFixed(3)})`;
        ctx.lineWidth=0.32+sigStrength*0.45;
      } else {
        /* Reduced tier: skip drawing faint ambient connections below opacity threshold */
        if((document.documentElement.dataset.perf||'full')==='reduced'&&fade*0.06<0.025)continue;
        const mid=zoneColor(((a.x+b.x)*.5)/W);
        ctx.strokeStyle=`rgba(${mid.r},${mid.g},${mid.b},${((0.018+fade*0.06)*0.82).toFixed(3)})`;
        ctx.lineWidth=0.3;
      }
      ctx.stroke();
    }
  }

  /* Draw environmental pulses — atmospheric rings from interaction points */
  for(let i=ENV_PULSES.length-1;i>=0;i--){
    const ep=ENV_PULSES[i];
    ep.r+=(ep.maxR-ep.r)*ep.spd;
    ep.alpha*=0.963;
    if(ep.alpha<0.003){ENV_PULSES.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(ep.x,ep.y,ep.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${ep.color.r},${ep.color.g},${ep.color.b},${ep.alpha.toFixed(3)})`;
    ctx.lineWidth=0.65;
    ctx.stroke();
  }

  /* Draw particles */
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const c=zoneColor(p.x/W);
    const isActive=p.signal>0.1;
    const baseAlpha=0.22+p.alpha*0.45;
    const a=isActive?Math.min(0.98,baseAlpha+p.signal*0.7):baseAlpha;
    const r=isActive?p.r*(1+p.signal*0.9):p.r;

    if(isActive&&p.signal>0.3){
      ctx.shadowBlur=2+p.signal*3.5;
      ctx.shadowColor=`rgba(${p.signalColor?p.signalColor.r:c.r},${p.signalColor?p.signalColor.g:c.g},${p.signalColor?p.signalColor.b:c.b},0.42)`;
    } else if(a>0.45){
      ctx.shadowBlur=1;
      ctx.shadowColor=`rgba(${c.r},${c.g},${c.b},0.18)`;
    } else {
      ctx.shadowBlur=0;
    }
    ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${a.toFixed(3)})`;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  requestAnimationFrame(draw);
}

/* ── TIER UPGRADE HANDLER (canvas IIFE) ── */
/* Reactivates canvas when benchmark upgrades from provisional-minimal to reduced. */
if(window.FORM_TIER_ONCHANGE)window.FORM_TIER_ONCHANGE.push(function(newTier,prevTier){
  if(prevTier==='minimal'&&newTier!=='minimal'&&_svgInjected){

    }
    /* Restart draw loop */
    if(!reducedMotion)requestAnimationFrame(draw);
  }
});

/* ── CINEMATIC PAGE EXIT ── */
(function(){
  const veil=document.getElementById('veil');
  document.querySelectorAll('a[href]').forEach(a=>{
    const href=a.getAttribute('href');
    if(!href||href==='#'||href.startsWith('http')||href.startsWith('mailto'))return;
    a.addEventListener('click',function(e){
      e.preventDefault();
      const dest=href;
      veil.style.animation='none';
      veil.style.opacity='0';
      veil.style.pointerEvents='all';
      requestAnimationFrame(()=>{
        veil.style.transition='opacity .55s cubic-bezier(.7,0,.3,1)';
        veil.style.opacity='1';
        setTimeout(()=>{ window.location.href=dest; },580);
      });
    });
  });
})();
})();
</script>
